# Bandit SAST configuration (CI uploads JSON artifacts; CodeQL is separate).
exclude_dirs:
  - /tests/
  - /.venv/
  - /venv/
  - /notebooks/

# B615 flags unpinned HF `load_dataset` revisions. For class demos we skip it;
# in production, pin `revision=` to a dataset commit SHA.
# B104 fires on literal 0.0.0.0 in URL host blocklists (SSRF guard); not a server bind.
skips:
  - B615
  - B104
